name: Deploy to Firebase

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      
      - name: Build
        working-directory: apps/web
        run: npm run build
      
      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project veriftout-v2 --token ${{ secrets.FIREBASE_TOKEN }}
